  function renderCart() {
    const container = document.getElementById('cart-container');
    const summary = document.getElementById('cart-summary');
    const emptyMsg = document.getElementById('empty-cart-msg');
    const totalEl = document.getElementById('cart-total');
    
    if (!container || !summary || !emptyMsg || !totalEl) return;

    const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');

    if (cart.length === 0) {
      container.style.display = 'none';
      summary.style.display = 'none';
      emptyMsg.style.display = 'block';
      return;
    }

    emptyMsg.style.display = 'none';
    container.style.display = 'block';
    summary.style.display = 'block';

    let total = 0;
    container.innerHTML = cart.map((item, index) => {
      total += item.price;
      return `
        <div class="cart-item">
          <div class="item-info">
            <span class="item-name">${item.name}</span>
            <span class="item-price">${currency}${item.price.toLocaleString()}</span>
          </div>
          <button class="remove-item" data-index="${index}">Eliminar</button>
        </div>
      `;
    }).join('');

    totalEl.textContent = `${currency}${total.toLocaleString()}`;

    // Handle form input and button activation
    const addressInput = document.getElementById('delivery-address');
    const instructionsInput = document.getElementById('special-instructions');
    const orderBtn = document.getElementById('whatsapp-order-btn');

    const updateOrderDetails = () => {
      const address = addressInput.value.trim();
      const instructions = instructionsInput.value.trim();
      
      sessionStorage.setItem('delivery_address', address);
      sessionStorage.setItem('special_instructions', instructions);

      if (address.length > 5) {
        orderBtn?.classList.remove('disabled');
      } else {
        orderBtn?.classList.add('disabled');
      }
    };

    if (addressInput && !addressInput.dataset.listenerAdded) {
      addressInput.addEventListener('input', updateOrderDetails);
      addressInput.dataset.listenerAdded = 'true';
    }
    if (instructionsInput && !instructionsInput.dataset.listenerAdded) {
      instructionsInput.addEventListener('input', updateOrderDetails);
      instructionsInput.dataset.listenerAdded = 'true';
    }

    // Setup remove buttons
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const index = parseInt(e.target.dataset.index);
        const newCart = [...cart];
        newCart.splice(index, 1);
        sessionStorage.setItem('cart', JSON.stringify(newCart));
        window.dispatchEvent(new Event('cart-updated'));
        renderCart();
      });
    });
  }

  // Clear cart logic
  const clearBtn = document.getElementById('clear-cart');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm('¿Estás seguro de que quieres vaciar tu carrito?')) {
        sessionStorage.removeItem('cart');
        window.dispatchEvent(new Event('cart-updated'));
        renderCart();
      }
    });
  }

  // Initial render
  renderCart();
  
  // Re-render on page load (Astro)
  document.addEventListener('astro:page-load', renderCart);
})();</script>
